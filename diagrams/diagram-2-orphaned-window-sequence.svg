<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
<title>Orphaned window failure mode after WerFault crash</title>
<desc>Sequence showing how a crashed application's error dialog persisted as an orphaned window with no backing process, which could not be closed by standard remote process-termination methods and required a physical session reset.</desc>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="200" y="20" width="280" height="64" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#2C2C2A">Map app crashes</text>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">WebView2 process fails</text>
<line x1="340" y1="84" x2="340" y2="134" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="134" width="280" height="64" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#412402">WerFault launches dialog</text>
<text x="340" y="176" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Cannot be dismissed remotely</text>
<line x1="340" y1="198" x2="340" y2="248" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="248" width="280" height="64" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="268" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Process force-terminated</text>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Via Task Manager, taskkill</text>
<line x1="340" y1="312" x2="340" y2="362" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="362" width="280" height="64" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="382" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">Window handle persists</text>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">OS leaves orphaned window</text>
<line x1="340" y1="426" x2="340" y2="476" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="476" width="280" height="64" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="496" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#4A1B0C">Remote kill attempts fail</text>
<text x="340" y="518" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">No matching process found</text>
<line x1="340" y1="540" x2="340" y2="590" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="200" y="590" width="280" height="64" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="610" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#04342C">Session reset required</text>
<text x="340" y="632" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Local reboot clears window</text>

<text x="340" y="690" text-anchor="middle" font-size="12" fill="#5F5E5A">Gray = event, amber = warning, coral = unresolved, teal = resolved</text>
</svg>
